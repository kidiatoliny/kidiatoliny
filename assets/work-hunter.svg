<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="190" viewBox="0 0 1200 190" role="img" aria-labelledby="title description">
  <title id="title">Hunter</title>
  <desc id="description">Open-source network for Cape Verdean creators, thinkers, and builders.</desc>
  <style>
    .card{fill:#f6f8fa;stroke:#d0d7de}.title{fill:#1f2328}.meta{fill:#57606a}.body{fill:#424a53}.stack{fill:#bc4c00}
    @media (prefers-color-scheme:dark){.card{fill:#161b22;stroke:#30363d}.title{fill:#f0f6fc}.meta{fill:#8b949e}.body{fill:#c9d1d9}.stack{fill:#ffa657}}
  </style>
  <rect class="card" x="1" y="1" width="1198" height="188" rx="16"/>
  <rect x="1" y="1" width="7" height="188" rx="4" fill="#bc4c00"/>
  <text class="title" x="36" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="700">Hunter</text>
  <text class="meta" x="1164" y="46" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="15">CAPE VERDEAN BUILDERS</text>
  <text class="body" x="36" y="90" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19">Open-source network where creators, thinkers, and builders publish ideas, give projects visibility,</text>
  <text class="body" x="36" y="118" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19">and connect around work with purpose.</text>
  <text class="stack" x="36" y="158" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="600">Product platform · community · open source</text>
</svg>
