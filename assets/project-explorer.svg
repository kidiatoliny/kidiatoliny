<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title description">
  <title id="title">Kidiatoliny project explorer</title>
  <desc id="description">A grouped view of products, Apple native software, payments, Laravel packages, systems tooling, and applied intelligence projects.</desc>
  <style>
    .window{fill:#f6f8fa;stroke:#d0d7de}.bar{fill:#eaedf0}.divider{stroke:#d0d7de}.title{fill:#57606a}.heading{fill:#1f2328}.path{fill:#0969da}.item{fill:#424a53}.muted{fill:#6e7781}.prompt{fill:#1a7f37}
    @media (prefers-color-scheme:dark){.window{fill:#0d1117;stroke:#30363d}.bar{fill:#161b22}.divider{stroke:#30363d}.title{fill:#8b949e}.heading{fill:#f0f6fc}.path{fill:#58a6ff}.item{fill:#c9d1d9}.muted{fill:#8b949e}.prompt{fill:#7ee787}}
  </style>
  <defs>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#010409" flood-opacity="0.22"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
